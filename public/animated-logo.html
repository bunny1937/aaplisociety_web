<!doctype html>
<!-- @dsCard group="Brand" name="Logo — animated seal" subtitle="Seal fills in, border traces bottom-right to left, isometric towers pop up from the base" viewport="600x360" -->
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0}
body{font-family:"Inter",-apple-system,sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;gap:14px;padding:36px}
.stage{width:220px;height:220px;display:flex;align-items:center;justify-content:center}
.reload{padding:8px 16px;background:#1e3a8a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.reload:hover{background:#1e40af}
</style>
</head>
<body>
<div class="stage"><div id="anim" style="width:200px;height:200px"></div></div>
<button class="reload" onclick="replay()">Replay</button>

<template id="tpl">
<svg viewBox="-4 -4 72 72" width="100%" height="100%">
<style>
.seal-fill{opacity:0;transform-origin:32px 32px;animation:sealIn 4.5s ease infinite}
@keyframes sealIn{0%{opacity:0;transform:scale(.85)}9%{opacity:1;transform:scale(1)}100%{opacity:1;transform:scale(1)}}
.trace{opacity:0;stroke-dasharray:104;stroke-dashoffset:104;animation:traceIn 4.5s ease infinite}
@keyframes traceIn{0%{opacity:0;stroke-dashoffset:104}9%{opacity:0;stroke-dashoffset:104}11%{opacity:1}55%{stroke-dashoffset:0}100%{opacity:1;stroke-dashoffset:0}}
.tower{opacity:0;animation:towerPop 4.5s cubic-bezier(.2,.8,.3,1.1) infinite;animation-fill-mode:both}
@keyframes towerPop{0%{opacity:0;transform:translateY(14px) scale(.92)}25%{opacity:1;transform:translateY(-2px) scale(1.05)}35%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:1;transform:translateY(0) scale(1)}}
.t-left{transform-origin:12.5px 59px;animation-delay:2.35s}
.t-center{transform-origin:32px 59px;animation-delay:2.55s}
.t-right{transform-origin:51.5px 59px;animation-delay:2.75s}
</style>
<path class="seal-fill" d="M32 -2 A34 34 0 0 1 66 32 L66 60 Q66 66 60 66 L4 66 Q-2 66 -2 60 L-2 32 A34 34 0 0 1 32 -2 Z" fill="#1e3a8a"/>
<path class="trace" pathLength="100" d="M60 62 L4 62 Q2 62 2 60 L2 32 A30 30 0 0 1 32 2 A30 30 0 0 1 62 32 L62 60 Q62 62 60 62 Z" fill="none" stroke="#fff" stroke-width="1" opacity="0.45"/>
<g class="tower t-left">
<path d="M7 59 L7 30 L18 30 L18 59 Z" fill="#fff"/>
<path d="M7 30 L4.5 28 L15.5 28 L18 30 Z" fill="#fff" opacity="0.35"/>
<path d="M7 30 L4.5 28 L4.5 53 L7 59 Z" fill="#000" opacity="0.16"/>
<g fill="#1e3a8a">
<rect x="8.8" y="32.5" width="2.8" height="2.8"/><rect x="13.4" y="32.5" width="2.8" height="2.8"/>
<rect x="8.8" y="37.8" width="2.8" height="2.8"/><rect x="13.4" y="37.8" width="2.8" height="2.8"/>
<rect x="8.8" y="43.1" width="2.8" height="2.8"/><rect x="13.4" y="43.1" width="2.8" height="2.8"/>
<rect x="8.8" y="48.4" width="2.8" height="2.8"/><rect x="13.4" y="48.4" width="2.8" height="2.8"/>
<rect x="8.8" y="53.7" width="2.8" height="2.8"/><rect x="13.4" y="53.7" width="2.8" height="2.8"/>
</g>
</g>
<g class="tower t-center">
<path d="M22 59 L22 12 L42 12 L42 59 Z" fill="#fff"/>
<path d="M22 12 L19.5 10 L37.5 10 L42 12 Z" fill="#fff" opacity="0.35"/>
<path d="M22 12 L19.5 10 L19.5 53 L22 59 Z" fill="#000" opacity="0.16"/>
<g fill="#1e3a8a">
<rect x="24.45" y="17" width="3.4" height="3.4"/><rect x="30.3" y="17" width="3.4" height="3.4"/><rect x="36.15" y="17" width="3.4" height="3.4"/>
<rect x="24.45" y="25.4" width="3.4" height="3.4"/><rect x="30.3" y="25.4" width="3.4" height="3.4"/><rect x="36.15" y="25.4" width="3.4" height="3.4"/>
<rect x="24.45" y="33.8" width="3.4" height="3.4"/><rect x="30.3" y="33.8" width="3.4" height="3.4"/><rect x="36.15" y="33.8" width="3.4" height="3.4"/>
<rect x="24.45" y="42.2" width="3.4" height="3.4"/><rect x="30.3" y="42.2" width="3.4" height="3.4"/><rect x="36.15" y="42.2" width="3.4" height="3.4"/>
<rect x="24.45" y="50.6" width="3.4" height="3.4"/><rect x="30.3" y="50.6" width="3.4" height="3.4"/><rect x="36.15" y="50.6" width="3.4" height="3.4"/>
</g>
</g>
<g class="tower t-right">
<path d="M46 59 L46 30 L57 30 L57 59 Z" fill="#fff"/>
<path d="M46 30 L43.5 28 L54.5 28 L57 30 Z" fill="#fff" opacity="0.35"/>
<path d="M46 30 L43.5 28 L43.5 53 L46 59 Z" fill="#000" opacity="0.16"/>
<g fill="#1e3a8a">
<rect x="47.8" y="32.5" width="2.8" height="2.8"/><rect x="52.4" y="32.5" width="2.8" height="2.8"/>
<rect x="47.8" y="37.8" width="2.8" height="2.8"/><rect x="52.4" y="37.8" width="2.8" height="2.8"/>
<rect x="47.8" y="43.1" width="2.8" height="2.8"/><rect x="52.4" y="43.1" width="2.8" height="2.8"/>
<rect x="47.8" y="48.4" width="2.8" height="2.8"/><rect x="52.4" y="48.4" width="2.8" height="2.8"/>
<rect x="47.8" y="53.7" width="2.8" height="2.8"/><rect x="52.4" y="53.7" width="2.8" height="2.8"/>
</g>
</g>
</svg>
</template>

<script>
function mount(){ const t=document.getElementById('tpl'); const h=document.getElementById('anim'); h.innerHTML=''; h.appendChild(t.content.cloneNode(true)); }
function replay(){ mount(); }
mount();
</script>
</body>
</html>
